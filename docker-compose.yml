version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tcredex
      MYSQL_USER: tcredex
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: tcredex
      MYSQL_USER: tcredex
      MYSQL_PASSWORD: password
    ports:
      - "8000:8000"
    command: gunicorn src.run:app -b 0.0.0.0:8000 --workers 2

volumes:
  db_data:
